<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional BG Remover</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">

        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-wand-magic-sparkles"></i>
                <span>BG Remover</span>
            </div>
            <p>Remove image backgrounds instantly with AI</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="file">
                <i class="fas fa-cloud-upload-alt"></i> Upload File
            </button>
            <button class="tab-btn" data-tab="url">
                <i class="fas fa-link"></i> Image URL
            </button>
        </div>

        <!-- ─── Panel: File ─── -->
        <div class="panel active" id="panel-file">
            <div class="drop-zone" id="dropZone">
                <div class="icon"><i class="fas fa-image"></i></div>
                <h3>Drag &amp; drop your image here</h3>
                <p>or click to browse &nbsp;·&nbsp; PNG, JPG, WEBP up to 10MB</p>
                <button class="browse-btn" id="browseBtn"><i class="fas fa-folder-open"></i> Choose File</button>
                <input type="file" id="fileInput" accept="image/*" />
                <div class="file-preview" id="filePreview">
                    <img id="filePreviewImg" src="#" alt="preview" />
                    <div>
                        <div class="file-name" id="fileName">image.jpg</div>
                        <div class="file-size" id="fileSize">0 KB</div>
                    </div>
                </div>
            </div>
            <button class="btn-remove" id="removeFileBtn" disabled>
                <i class="fas fa-wand-magic-sparkles"></i> Remove Background
            </button>
        </div>

        <!-- ─── Panel: URL ─── -->
        <div class="panel" id="panel-url">
            <div class="url-input-group">
                <input type="url" id="urlInput" placeholder="https://example.com/image.jpg" />
            </div>
            <div class="url-preview" id="urlPreview">
                <img id="urlPreviewImg" src="#" alt="preview" />
            </div>
            <button class="btn-remove" id="removeUrlBtn" disabled>
                <i class="fas fa-wand-magic-sparkles"></i> Remove Background
            </button>
        </div>

        <!-- ─── Status ─── -->
        <div class="status" id="status"></div>

        <!-- ─── Result ─── -->
        <div class="result-section" id="resultSection">
            <div class="result-wrapper">
                <div class="comparison">
                    <div class="box">
                        <div class="label">Original</div>
                        <img id="resultOriginal" src="#" alt="original" />
                    </div>
                    <div class="box">
                        <div class="label">No Background</div>
                        <img id="resultNoBg" src="#" alt="no background" />
                    </div>
                </div>
                <button class="download-btn" id="downloadBtn">
                    <i class="fas fa-download"></i> Download HD Image
                </button>
            </div>
        </div>

    </div>

   
   <script src="script.js"></script>
</body>
</html>
